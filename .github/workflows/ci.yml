name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - default

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create reports directory
        run: mkdir -p reports/screenshots

      - name: Run tests
        env:
          MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
          BASE_URL: ${{ vars.BASE_URL || 'https://staging.spot.care/' }}
          HEADLESS: 'true'
          DEFAULT_TIMEOUT: '60000'
        run: npm test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            reports/cucumber-report.html
            reports/cucumber-report.json
            reports/screenshots/
          retention-days: 14

      - name: Publish test summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/cucumber-report.json';

            if (!fs.existsSync(path)) {
              core.warning('No test report found');
              return;
            }

            try {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              let passed = 0;
              let failed = 0;
              let skipped = 0;

              for (const feature of report) {
                for (const element of feature.elements || []) {
                  if (element.type === 'scenario') {
                    const steps = element.steps || [];
                    const hasFailed = steps.some(s => s.result?.status === 'failed');
                    const hasSkipped = steps.some(s => s.result?.status === 'skipped');
                    const allPassed = steps.every(s => s.result?.status === 'passed');

                    if (hasFailed) failed++;
                    else if (hasSkipped && !allPassed) skipped++;
                    else if (allPassed) passed++;
                  }
                }
              }

              const total = passed + failed + skipped;
              const summary = `## Test Results\n\n| Status | Count |\n|--------|-------|\n| ✅ Passed | ${passed} |\n| ❌ Failed | ${failed} |\n| ⏭️ Skipped | ${skipped} |\n| **Total** | **${total}** |`;

              await core.summary.addRaw(summary).write();
            } catch (error) {
              core.warning(`Failed to parse test report: ${error.message}`);
            }
